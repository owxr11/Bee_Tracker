<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UGPS - Verifica tu correo</title>
    <link rel="shortcut icon" href="./assets/img/logoUGPS.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body class="login-body d-flex align-items-center justify-content-center min-vh-100 p-3">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-9 col-md-6 col-lg-4">
                <div class="login-card p-4 p-sm-5 text-center">

                    <i class="bi bi-envelope-check" style="font-size:4rem;color:var(--ug-gold-bright)"></i>

                    <h2 class="fw-bold text-ug-gold-bright mt-3 mb-2">Verifica tu correo</h2>
                    <p class="text-white-50 small mb-4">
                        Te enviamos un enlace de verificación a tu correo <strong id="userEmail"
                            class="text-white"></strong>.
                        Revisa tu bandeja de correo no deseado y haz click en el enlace para continuar.
                    </p>

                    <div id="verifyAlert" class="alert alert-danger d-none" role="alert"></div>
                    <div id="verifySuccess" class="alert alert-success d-none" role="alert"></div>

                    <div class="d-grid mb-3">
                        <button id="btnResend" class="btn btn-ug-gold w-100 transition-base">
                            <i class="bi bi-send me-2"></i>Reenviar correo
                        </button>
                    </div>

                    <div class="d-grid mb-4">
                        <button id="btnCheck" class="btn btn-outline-secondary w-100 transition-base">
                            <i class="bi bi-arrow-clockwise me-2"></i>Ya verifiqué, continuar
                        </button>
                    </div>

                    <div class="text-center">
                        <button id="btnLogout" class="btn btn-link text-white-50 small text-decoration-none">
                            <i class="bi bi-box-arrow-right me-1"></i>Cerrar sesión
                        </button>
                    </div>

                    <div class="mt-4 pt-3 border-top border-secondary border-opacity-25">
                        <small class="text-white-50 font-monospace login-footer-text">DICIS · Salamanca</small>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./assets/js/verify_email.js"></script>
</body>

</html>
