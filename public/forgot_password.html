<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UGPS - Recuperar contraseña</title>
    <link rel="shortcut icon" href="./assets/img/logoUGPS.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body class="login-body d-flex align-items-center justify-content-center min-vh-100 p-3">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-9 col-md-6 col-lg-4">
                <div class="login-card p-4 p-sm-5 text-center">

                    <i class="bi bi-key" style="font-size:3.5rem;color:var(--ug-gold-bright)"></i>

                    <h2 class="fw-bold text-ug-gold-bright mt-3 mb-2">Recuperar contraseña</h2>
                    <p class="text-white-50 small mb-4">Ingresa tu correo institucional y te enviaremos un enlace para
                        restablecer tu contraseña.</p>

                    <div id="forgotAlert" class="alert alert-danger d-none" role="alert"></div>
                    <div id="forgotSuccess" class="alert alert-success d-none" role="alert"></div>

                    <div class="mb-4 text-start">
                        <label class="form-label text-white-50 small ms-1 fw-medium">CORREO INSTITUCIONAL</label>
                        <div class="position-relative">
                            <i class="bi bi-envelope input-group-icon"></i>
                            <input type="email" class="form-control form-control-dark" id="forgotEmail"
                                placeholder="ejemplo@ugto.mx">
                        </div>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="button" id="btnForgot" class="btn btn-ug-gold w-100 fs-5 transition-base">
                            <i class="bi bi-send me-2"></i>Enviar enlace
                        </button>
                    </div>

                    <div class="text-center">
                        <a href="./login.html" class="text-white-50 small text-decoration-none hover-underline">
                            <i class="bi bi-arrow-left me-1"></i>Volver al login
                        </a>
                    </div>

                    <div class="mt-4 pt-3 border-top border-secondary border-opacity-25">
                        <small class="text-white-50 font-monospace login-footer-text">DICIS · Salamanca</small>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./assets/js/forgot_password.js"></script>
</body>

</html>
